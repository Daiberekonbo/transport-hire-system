{% extends "base.html" %}
{% block title %}Create User{% endblock %}
{% block page_title %}Create User{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-header-title">Create New User</h1>
    <div class="page-header-sub">Add a new account to THMS.</div>
  </div>
  <a href="{{ url_for('admin.index') }}#users" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i>Back
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-12 col-lg-6">
    <div class="thms-card">
      <div class="thms-card-header">
        <h6 class="thms-card-title"><i class="bi bi-person-plus-fill text-primary"></i> New User Details</h6>
      </div>
      <div class="thms-card-body">
        <form method="POST" action="{{ url_for('admin.create_user') }}" novalidate>
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-3">
            <label class="thms-form-label">Username <span class="text-danger">*</span></label>
            <input type="text" name="username" class="form-control" required minlength="3"
                   placeholder="e.g. grace_admin" autocomplete="off">
          </div>

          <div class="mb-3">
            <label class="thms-form-label">Display Name</label>
            <input type="text" name="display_name" class="form-control"
                   placeholder="e.g. Mrs. Grace" autocomplete="off">
            <div class="form-text">Friendly name shown in greetings and the sidebar.</div>
          </div>

          <div class="mb-3">
            <label class="thms-form-label">Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="user@example.com" autocomplete="off">
          </div>

          <div class="mb-3">
            <label class="thms-form-label">Role <span class="text-danger">*</span></label>
            <select name="role" class="form-select">
              <option value="owner">Owner — full access</option>
              <option value="developer">Developer — system tools access</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="thms-form-label">Password <span class="text-danger">*</span></label>
            <input type="password" name="password" class="form-control" required minlength="6" autocomplete="new-password">
            <div class="form-text">Minimum 6 characters.</div>
          </div>

          <div class="mb-4">
            <label class="thms-form-label">Confirm Password <span class="text-danger">*</span></label>
            <input type="password" name="confirm_password" class="form-control" required minlength="6" autocomplete="new-password">
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-person-plus-fill me-2"></i>Create User
            </button>
            <a href="{{ url_for('admin.index') }}#users" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
