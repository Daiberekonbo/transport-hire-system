<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>{% block title %}Report{% endblock %} — THMS</title>
<style>
  @page {
    size: A4 landscape;
    margin: 1.5cm 1.8cm 2cm 1.8cm;
    @bottom-center {
      content: "Page " counter(page) " of " counter(pages);
      font-size: 8pt;
      color: #888;
    }
  }
  body {
    font-family: Helvetica, Arial, sans-serif;
    font-size: 9pt;
    color: #1a1a1a;
    margin: 0;
    padding: 0;
  }
  .report-header {
    border-bottom: 2px solid #1a2341;
    padding-bottom: 6pt;
    margin-bottom: 14pt;
  }
  .report-header .company {
    font-size: 13pt;
    font-weight: bold;
    color: #1a2341;
  }
  .report-header .report-title {
    font-size: 11pt;
    font-weight: bold;
    color: #333;
    margin-top: 2pt;
  }
  .report-header .meta {
    font-size: 7.5pt;
    color: #666;
    margin-top: 3pt;
  }
  table.data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 8pt;
    margin-top: 8pt;
  }
  table.data-table th {
    background-color: #1a2341;
    color: #ffffff;
    padding: 5pt 6pt;
    text-align: left;
    font-weight: bold;
    font-size: 7.5pt;
  }
  table.data-table td {
    padding: 4pt 6pt;
    border-bottom: 1px solid #e8e8e8;
    vertical-align: top;
  }
  table.data-table tr:nth-child(even) td {
    background-color: #f8f9fa;
  }
  table.data-table tfoot td {
    border-top: 1.5px solid #1a2341;
    font-weight: bold;
    background-color: #f1f3f7;
  }
  .badge {
    display: inline-block;
    padding: 1pt 4pt;
    border-radius: 3pt;
    font-size: 7pt;
    font-weight: bold;
  }
  .badge-success { background-color: #d1fae5; color: #065f46; }
  .badge-danger  { background-color: #fee2e2; color: #991b1b; }
  .badge-warning { background-color: #fef3c7; color: #92400e; }
  .badge-primary { background-color: #dbeafe; color: #1e40af; }
  .badge-secondary { background-color: #f1f5f9; color: #475569; }
  .summary-grid {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 12pt;
  }
  .summary-grid td {
    padding: 6pt 8pt;
    border: 1px solid #e2e8f0;
    background-color: #f8f9fb;
    vertical-align: top;
    width: 16.6%;
  }
  .summary-grid .label {
    font-size: 7pt;
    color: #666;
    margin-bottom: 2pt;
  }
  .summary-grid .value {
    font-size: 10pt;
    font-weight: bold;
    color: #1a2341;
  }
  .section-heading {
    font-size: 9.5pt;
    font-weight: bold;
    color: #1a2341;
    margin: 14pt 0 6pt;
    padding-bottom: 3pt;
    border-bottom: 1px solid #cbd5e1;
  }
  .filters-row {
    font-size: 7.5pt;
    color: #555;
    margin-bottom: 8pt;
    background: #f8f9fb;
    padding: 4pt 6pt;
    border-left: 3pt solid #1a2341;
  }
  .filters-row strong { color: #1a2341; }
  .text-success { color: #065f46; }
  .text-danger  { color: #991b1b; }
  .text-warning { color: #92400e; }
  .text-muted   { color: #64748b; }
  .fw-bold      { font-weight: bold; }
  .text-right   { text-align: right; }
  .text-center  { text-align: center; }
</style>
</head>
<body>

<div class="report-header">
  <table width="100%"><tr>
    <td>
      <div class="company">Transport Hire Management System</div>
      <div class="report-title">{% block report_title %}Report{% endblock %}</div>
      <div class="meta">{% block report_meta %}Generated: {{ now.strftime('%d %B %Y at %H:%M') }}{% endblock %}</div>
    </td>
    <td style="text-align:right;vertical-align:top;font-size:7.5pt;color:#888;">
      {% block report_filters %}{% endblock %}
    </td>
  </tr></table>
</div>

{% block body %}{% endblock %}

</body>
</html>
