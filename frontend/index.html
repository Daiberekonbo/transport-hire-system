<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f46e5" />
  <link rel="manifest" href="/manifest.json" />
  <title>My App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2.5rem 3rem;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: #4f46e5;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      margin-bottom: 1.25rem;
    }
    h1 { font-size: 1.75rem; margin-bottom: 0.75rem; }
    p { color: #555; line-height: 1.6; margin-bottom: 1.5rem; }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: #16a34a;
      background: #dcfce7;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      margin-bottom: 1.5rem;
    }
    .status::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #16a34a;
      border-radius: 50%;
    }
    .api-result {
      margin-top: 1rem;
      background: #f8f8ff;
      border: 1px solid #e0e0f0;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      font-family: monospace;
      color: #333;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-all;
    }
    button {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1.4rem;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #3730a3; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">PWA + FastAPI</span>
    <h1>Welcome to My App</h1>
    <p>Your application is up and running. The backend API is connected and ready.</p>
    <div class="status" id="status">Checking backend…</div>
    <br />
    <button onclick="callApi()">Call API</button>
    <div class="api-result" id="result" style="display:none"></div>
  </div>

  <script>
    async function checkHealth() {
      try {
        const res = await fetch('/api/health');
        const data = await res.json();
        document.getElementById('status').textContent = 'Backend connected — ' + data.status;
      } catch {
        const el = document.getElementById('status');
        el.textContent = 'Backend unreachable';
        el.style.color = '#dc2626';
        el.style.background = '#fee2e2';
      }
    }

    async function callApi() {
      const el = document.getElementById('result');
      el.style.display = 'block';
      el.textContent = 'Loading…';
      try {
        const res = await fetch('/api/info');
        const data = await res.json();
        el.textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        el.textContent = 'Error: ' + e.message;
      }
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js');
      });
    }

    checkHealth();
  </script>
</body>
</html>
