{% extends "base.html" %}
{% block title %}Add Driver{% endblock %}
{% block page_title %}Add New Driver{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-header-title">Add New Driver</h1>
    <div class="page-header-sub">Fill in the driver's personal and contact details.</div>
  </div>
  <a href="{{ url_for('drivers.index') }}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left"></i> Back
  </a>
</div>

<form method="POST" action="{{ url_for('drivers.add') }}">
  <div class="row g-3">

    <!-- Personal Info -->
    <div class="col-12 col-lg-8">
      <div class="thms-card mb-3">
        <div class="thms-card-header">
          <h6 class="thms-card-title"><i class="bi bi-person-fill text-primary"></i> Personal Information</h6>
        </div>
        <div class="thms-card-body">
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label class="thms-form-label">Full Name *</label>
              <input type="text" name="full_name" class="form-control" required placeholder="e.g. Emeka Okafor" />
            </div>
            <div class="col-12 col-md-6">
              <label class="thms-form-label">Phone Number *</label>
              <input type="tel" name="phone" class="form-control" required placeholder="e.g. 08012345678" />
            </div>
            <div class="col-12">
              <label class="thms-form-label">Home Address</label>
              <textarea name="address" class="form-control" rows="2" placeholder="Full residential address"></textarea>
            </div>
            <div class="col-12 col-md-6">
              <label class="thms-form-label">National ID Number</label>
              <input type="text" name="national_id" class="form-control" placeholder="NIN or ID number" />
            </div>
          </div>
        </div>
      </div>

      <!-- Next of Kin -->
      <div class="thms-card mb-3">
        <div class="thms-card-header">
          <h6 class="thms-card-title"><i class="bi bi-person-heart text-danger"></i> Next of Kin</h6>
        </div>
        <div class="thms-card-body">
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label class="thms-form-label">Full Name</label>
              <input type="text" name="nok_name" class="form-control" placeholder="Next of kin name" />
            </div>
            <div class="col-12 col-md-6">
              <label class="thms-form-label">Phone</label>
              <input type="tel" name="nok_phone" class="form-control" placeholder="Phone number" />
            </div>
            <div class="col-12 col-md-6">
              <label class="thms-form-label">Relationship</label>
              <input type="text" name="nok_relationship" class="form-control" placeholder="e.g. Wife, Brother" />
            </div>
            <div class="col-12 col-md-6">
              <label class="thms-form-label">Address</label>
              <input type="text" name="nok_address" class="form-control" placeholder="Address" />
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Side: Notes & Submit -->
    <div class="col-12 col-lg-4">
      <div class="thms-card mb-3">
        <div class="thms-card-header">
          <h6 class="thms-card-title"><i class="bi bi-sticky-fill text-warning"></i> Notes</h6>
        </div>
        <div class="thms-card-body">
          <textarea name="notes" class="form-control" rows="6" placeholder="Any additional notes about this driver…"></textarea>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-person-plus-fill me-2"></i>Add Driver
      </button>
      <a href="{{ url_for('drivers.index') }}" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
    </div>

  </div>
</form>
{% endblock %}
